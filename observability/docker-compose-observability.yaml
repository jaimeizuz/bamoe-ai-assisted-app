services:
  otel_collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    user: "1000:1000"
    profiles:
      - observability
    volumes:
      - >-
        ./opentelemetry/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:Z
      #- ../n8n/data/n8nEventLog.log:/var/log/n8nEventLog.log:ro
      #- n8n_logs:/var/log/n8n:ro
      - n8n_logs:/home/node/.n8n:ro
    command: '--config=/etc/otelcol/otel-collector-config.yaml'
    ports:
      - '8889:8889'
      - '13133:13133'
      - '4317:4317'
      - '4318:4318'
      - '15680:55680'
    #depends_on:
    #  n8n:
    #    condition: service_started
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    profiles:
      - observability
    volumes:
      - './prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z'
    ports:
      - '19090:9090'
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    profiles:
      - observability
    volumes:
      - './grafana/grafana.ini:/etc/grafana/grafana.ini:Z'
      - >-
       ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:Z
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres-observability:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana-user
      - GF_DATABASE_PASSWORD=grafana-pass
    ports:
      - '13000:3000'
    depends_on:
      postgres-observability:
        condition: service_healthy
  tempo-init:
    image: grafana/tempo:${TEMPO_VERSION}
    profiles:
      - init 
    user: root
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:Z
      - ./tempo/data:/var/tempo:Z
    command: chown -R 10001:10001 /var/tempo
  tempo:
    image: grafana/tempo:${TEMPO_VERSION}
    profiles:
      - observability
    command: [ "-config.file=/etc/tempo.yaml", "-target=all"] 
    user: root
    volumes:
    # Remove :z?
      - ./tempo/tempo.yaml:/etc/tempo.yaml:Z
      - /tempo/data:/var/tempo:Z
    ports:
      - "3200:3200" # tempo
      - "14317:4317" # otlp grpc
    #depends_on:
    #  - tempo-init
  loki:
    image: grafana/loki:${LOKI_VERSION}
    profiles:
      - observability
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:Z
    command: -config.file=/etc/loki/local-config.yaml
  postgres-observability:
    image: 'postgres:${POSTGRES_VERSION}'
    profiles:
      - observability
    ports:
      - '15434:5432'
    volumes:
      - './postgresql:/docker-entrypoint-initdb.d:Z'
      - './postgresql/postgresql.conf:/etc/postgresql.conf'
    command:
      postgres -c config_file=/etc/postgresql.conf
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-q'
        - '-d'
        - postgres
        - '-U'
        - postgres
      timeout: 45s
      interval: 10s
      retries: 50
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

volumes:
  n8n_logs:
