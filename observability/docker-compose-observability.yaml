services:
  otel_collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    profiles:
      - observability
    volumes:
      - >-
        ./opentelemetry/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:z
    command: '--config=/etc/otelcol/otel-collector-config.yaml'
    ports:
      - '8889:8889'
      - '13133:13133'
      - '4317:4317'
      - '4318:4318'
      - '15680:55680'
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    profiles:
      - observability
    volumes:
      - './prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:z'
    ports:
      - '19090:9090'
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    profiles:
      - observability
    volumes:
      - './grafana/grafana.ini:/etc/grafana/grafana.ini:z'
      - >-
       ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:z
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres-observability:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana-user
      - GF_DATABASE_PASSWORD=grafana-pass
    ports:
      - '3000:3000'
    depends_on:
      postgres-observability:
        condition: service_healthy
  init-tempo:
    image: grafana/tempo:${TEMPO_VERSION}
    profiles:
      - init
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./tempo/data:/var/tempo
  tempo:
    image: grafana/tempo:${TEMPO_VERSION}
    profiles:
      - observability
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
    # Remove :z?
      - ./tempo/tempo.yaml:/etc/tempo.yaml:z
      - ./tempo/data:/var/tempo:z
    ports:
      - "3200:3200" # tempo
      - "14317:4317" # otlp grpc
  loki:
    image: grafana/loki:${LOKI_VERSION}
    profiles:
      - observability
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:z
    command: -config.file=/etc/loki/local-config.yaml
  postgres-observability:
    image: 'postgres:${POSTGRES_VERSION}'
    profiles:
      - observability
    ports:
      - '15434:5432'
    volumes:
      - './postgresql:/docker-entrypoint-initdb.d:Z'
      - './postgresql/postgresql.conf:/etc/postgresql.conf'