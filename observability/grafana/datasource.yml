apiVersion: 1
datasources:
- name: Metrics (Prometheus)
  type: prometheus
  url: http://prometheus:9090
  isDefault: true
  access: proxy
  editable: true
- name: Logs (Loki)
  type: loki
  access: proxy
  url: http://loki:3100
  editable: true
- name: Traces (Tempo)
  type: tempo
  access: proxy
  url: http://tempo:3200
  editable: true
